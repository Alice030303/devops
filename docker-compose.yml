services:
  # front
  frontend:
   
    build: ./front/reactPFR 
    ports:
      - "5173:5173"
    volumes:
      - ./front/reactPFR:/usr/app
      - /usr/app/node_modules
    environment:
      - VITE_API_URL=http://localhost:9000
    depends_on:
      - server

  # back
  server:
    build: .
    ports:
      - "9000:3000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    env_file:
      - .env
    depends_on:
      - db

  # db
  db:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: